<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lawin Canvas — LC001</title>

  <link rel="stylesheet" href="style.css" />

  <!-- A-Frame (required by MindAR's A-Frame build) -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- MindAR Image Tracking (A-Frame integration) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

  <a-scene
    mindar-image="imageTargetSrc: assets/targets/targets.mind;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <video
        id="video-LC001"
        src="assets/videos/LC001.mp4"
        preload="auto"
        loop
        playsinline
        webkit-playsinline
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <!-- 2:3 aspect ratio, matching the physical canvas proportions
           (16x24, 24x36, 32x48, 40x60 in — all reduce to 2:3). -->
      <a-video
        id="painting-video-0"
        src="#video-LC001"
        width="2"
        height="3"
        position="0 0 0"
      ></a-video>
    </a-entity>

  </a-scene>

  <script src="app.js"></script>
</body>
</html>
