<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Lawin Canvas</title>

  <link rel="stylesheet" href="style.css" />

  <!-- A-Frame 1.6.0 -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- MindAR 1.2.5 (image tracking, A-Frame build) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

  <a-scene
    mindar-image="imageTargetSrc: assets/targets/targets.mind; autoStart: true; uiScanning: no; uiLoading: no;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-assets></a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target-0" mindar-image-target="targetIndex: 0">
      <a-plane
        id="plane-0"
        color="#00FF00"
        width="1"
        height="1"
        rotation="0 0 0"
        position="0 0 0"
      ></a-plane>
    </a-entity>

  </a-scene>

  <script src="app.js"></script>
</body>
</html>
